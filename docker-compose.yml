services:
  manager:
    build:
      context: ./manager-service
      dockerfile: Dockerfile
    ports:
      - "${MANAGER_PORT:-9000}:${MANAGER_PORT:-9000}"
    environment:
      - MANAGER_PORT=${MANAGER_PORT:-9000}
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgres://manager:manager@postgres:5432/manager_history
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - manager-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=manager_history
      - POSTGRES_USER=manager
      - POSTGRES_PASSWORD=manager
    volumes:
      - manager-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manager -d manager_history"]
      interval: 5s
      timeout: 5s
      retries: 10

  ui:
    build:
      context: ./manager-ui
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:${MANAGER_PORT:-9000}
      - HOST=0.0.0.0
    depends_on:
      - manager

  agent:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    environment:
      - MANAGER_URL=http://manager:${MANAGER_PORT:-9000}
      - SYNC_INTERVAL_MS=${SYNC_INTERVAL_MS:-15000}
    depends_on:
      - manager

volumes:
  manager-redis-data:
  manager-postgres-data:
